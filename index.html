<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Titip Cerita Rek! ✨</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="main-card">
        <header class="header-section">
            <div class="tag">Time to Say Goodbye 🥺👋</div>
            <h1>Bisa Kali Ngisi Ini Rekkkkkk...</h1>
            <p>Ayooo drop kesan pesanmu selama belajar bareng aku. Tenang, sing ngisi link iki tak dongakno tambah ganteng, cantik + rezekine lancar, hehe. ✌️</p>
        </header>

        <form action="https://formspree.io/f/YOUR_FORM_ID" method="POST" class="smk-form">
            
            <div class="input-box">
                <label for="nama">Inisial</label>
                <input type="text" id="nama" name="Nama" placeholder="sesukamu nama apa" required>
            </div>

            <div class="input-box">
                <label for="kesan">Kesanmu Selama Aku nde sini Rek</label>
                <textarea id="kesan" name="Kesan" rows="4" placeholder="Jujur ae rek, pas jamku seru pora? Opo aku pas ngajar ngeboseni? Tumpahno kabeh unek-unekmu nang kene..." required></textarea>
            </div>

            <div class="input-box">
                <label for="pesan">Pesan Nggo Aku rekkkk</label>
                <textarea id="pesan" name="Pesan" rows="4" placeholder="Kek ono wejangan utowo doa moga aku cepet lulus kuliah/ndang entuk kerja, bebas wes..." required></textarea>
            </div>

            <button type="submit" class="btn-gradient">Ndang Dikirim, Ojo Digantung! 👀</button>
        </form>
    </div>

</body>
</html>
